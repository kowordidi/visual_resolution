<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Visual Resolution</title>
</head>
<body>
    <h1>Visuelle Resolution</h1>
    <p>Gib deine Klauseln hier ein:</p>

    <textarea id="userInput" rows="1" cols="50">[["A","B"],["!A","B"],["!B"]]</textarea>
    <button id="sendBtn">Senden</button>

    <!-- <pre> sorgt dafür, dass Zeilenumbrüche und Einrückungen angezeigt werden -->
    <pre id="response" style="background-color:#f0f0f0; padding:10px;"></pre>

    <script>
        document.getElementById('sendBtn').addEventListener('click', () => {
            const value = document.getElementById('userInput').value;
            let clauses;

            try {
                clauses = JSON.parse(value);
            } catch (err) {
                alert("Ungültiges JSON!");
                return;
            }

            fetch('http://127.0.0.1:5000/resolve', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ clauses })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('response').textContent = JSON.stringify(data, null, 4);
            })
            .catch(error => {
                console.error('Fehler:', error);
                document.getElementById('response').innerText = error;
            });
        });
    </script>
</body>
</html>
