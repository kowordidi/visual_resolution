<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Visual Resolution</title>
    <style>
    /* Einfache Styles für Levels, Klauseln und neue Resolvents */
    .level-box {
        border: 1px solid gray;
        padding: 10px;
        margin: 10px 0;
        background-color: #fafafa;
    }
    .new-resolvent {
        color: green;
        font-weight: bold;
    }
    .clauses {
        color: blue;
        font-weight: bold;
        margin-bottom: 5px;
    }
    .no-new {
        color: red;
        font-weight: bold;
    }
</style>
</head>
<body>
    <h1>Visuelle Resolution</h1>
    <p>Gib deine Klauseln hier ein:</p>

    <textarea id="userInput" rows="1" cols="50">[["A","B"],["!A","B"],["!B"]]</textarea>
    <button id="sendBtn">Senden</button>

    <div id="resolution-container"></div>

    <script>
        document.getElementById('sendBtn').addEventListener('click', () => {
            const value = document.getElementById('userInput').value;
            let clauses;

            try {
                clauses = JSON.parse(value);
            } catch (err) {
                alert("Ungültiges JSON!");
                return;
            }

            fetch('http://127.0.0.1:5000/resolve', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ clauses })
            })
            .then(response => response.json())
            .then(data => {
                visualize_resolution(data);
            })
            .catch(error => {
                console.error('Fehler:', error);
            });
        });

        function visualize_resolution(data) {
            const container = document.getElementById('resolution-container');
            container.innerHTML = '';

            data.forEach(level => {
                const levelDiv = document.createElement('div');
                levelDiv.className = 'level-box';


                const levelTitle = document.createElement('h3');
                levelTitle.textContent = `level ${level.level}`;
                levelDiv.appendChild(levelTitle);

                // Alle aktuellen Klauseln
                const clauseList = document.createElement('div')
                clauseList.className = 'clauses'
                clauseList.textContent = 'Auf diesem Level bekannte Klauseln: ' + level.clauses.map(c => `[${c.join(', ')}]`).join(', ');
                levelDiv.appendChild(clauseList);

                // Schritte im Level
                const stepsDiv = document.createElement('ul');
                level.steps.forEach(step => {
                    const li = document.createElement('li');
                    li.textContent = `[${step.c1.join(', ')}], [${step.c2.join(', ')}], literal: ${step.literal}, type: ${step.type}`;
                    stepsDiv.appendChild(li);
                });
                levelDiv.appendChild(stepsDiv);

                // neue Resolventen hervorheben
                if (level.new_resolvents.length > 0) {
                    const newRes = document.createElement('div');
                    newRes.className = 'new-resolvent';
                    newRes.textContent = 'Neue Resolventen in diesem level: ' + level.new_resolvents.map(c => `[${c.join(', ')}]`).join(', ');
                    levelDiv.appendChild(newRes);
                } else {
                    const noNew = document.createElement('div');
                    noNew.className = 'no-new';
                    noNew.textContent = 'Keine neuen Klauseln mehr → Schnittregelabschluss vollständig';
                    levelDiv.appendChild(noNew);
                }


                container.appendChild(levelDiv);

            });
        }
    </script>
</body>
</html>
