<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Visual Resolution</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/leader-line@1.0.0/leader-line.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="top-container">
        <h1>Visuelle Resolution</h1>
        <p>Gib deine Klauseln hier ein:</p>
        <textarea id="userInput" rows="1" cols="50">{{A,B},{¬A, B}, {¬B}}</textarea>
        <button id="negateBtn" class = "btn">¬</button>
        <div id="button-container">
            <button id="sendBtn" class="btn">Senden</button>
            <button id="nextBtn" class="btn" disabled>Nächster Schritt</button>
            <button id="showAllBtn" class="btn" disabled>Alle Schritte anzeigen</button>
        </div>
    </div>

    <div id="resolution-container"></div>

</body>
</html>
